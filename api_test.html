<!DOCTYPE html>
<html>
<head>
  <title>Quick Test API</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f0f0f0; }
    .result { background: white; padding: 20px; border-radius: 8px; margin: 20px 0; }
    .success { border-left: 4px solid green; }
    .error { border-left: 4px solid red; }
    pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🧪 Quick API Test</h1>
  
  <button onclick="testAPI()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
    Test MyQuran API Now
  </button>

  <div id="results"></div>

  <script>
    async function testAPI() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<p>Testing...</p>';

      try {
        // Test 1: Cities
        console.log('Testing cities API...');
        const citiesRes = await fetch('https://api.myquran.com/v2/sholat/kota');
        const citiesData = await citiesRes.json();
        
        let citiesSummary = 'ERROR';
        if (citiesData.data && Array.isArray(citiesData.data)) {
          citiesSummary = `${citiesData.data.length} cities loaded`;
        }

        // Test 2: Schedule for Jakarta
        console.log('Testing schedule API...');
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const scheduleRes = await fetch(`https://api.myquran.com/v2/sholat/jadwal/1121/${year}/${month}`);
        const scheduleData = await scheduleRes.json();
        
        let scheduleSummary = 'ERROR';
        if (scheduleData.data && scheduleData.data.jadwal) {
          scheduleSummary = `${scheduleData.data.jadwal.length} days for ${scheduleData.data.lokasi}`;
        }

        resultsDiv.innerHTML = `
          <div class="result success">
            <h3>✓ API Tests Passed!</h3>
            <p><strong>Cities API:</strong> ${citiesSummary}</p>
            <p><strong>Schedule API:</strong> ${scheduleSummary}</p>
            <p style="color: green; margin-top: 10px;">All APIs are working correctly. The issue might be in the application logic.</p>
          </div>
        `;
      } catch (error) {
        resultsDiv.innerHTML = `
          <div class="result error">
            <h3>✗ API Tests Failed!</h3>
            <p><strong>Error:</strong> ${error.message}</p>
            <p style="color: red; margin-top: 10px;">There's a problem with the API endpoints or network connection.</p>
            <pre>${error.stack}</pre>
          </div>
        `;
      }
    }

    // Test on load
    window.addEventListener('load', testAPI);
  </script>
</body>
</html>
